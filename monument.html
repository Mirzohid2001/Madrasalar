<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monument Details | Madrasalar</title>
  <meta name="description" content="Detailed historical monument page with multilingual support." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="site-monument">
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top premium-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Madrasalar</a>
      <div class="lang-switcher nav-mobile-lang d-inline-flex d-lg-none me-2" role="group" aria-label="Language switcher">
        <button class="lang-btn" data-lang="uz">UZ</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#detailNav" aria-controls="detailNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="detailNav">
        <ul class="navbar-nav ms-auto me-3">
          <li class="nav-item"><a class="nav-link nav-link-text" href="index.html" data-i18n="backToHome">Back to Home</a></li>
        </ul>
        <div class="lang-switcher d-none d-lg-inline-flex" role="group" aria-label="Language switcher">
          <button class="lang-btn" data-lang="uz">UZ</button>
          <button class="lang-btn" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </nav>

  <header id="monumentHero" class="monument-hero">
    <div class="hero-overlay"></div>
    <div class="container monument-hero-content text-white">
      <p class="hero-kicker" data-i18n="detailKicker">Historical Landmark</p>
      <h1 id="monumentTitle" class="hero-title mb-0">...</h1>
    </div>
  </header>

  <main class="main-content py-5">
    <section class="container py-3 section-fade">
      <div id="monumentError" class="alert alert-warning d-none"></div>
      <div id="monumentContent" class="row g-4">
        <div class="col-lg-7" data-aos="fade-up">
          <article class="premium-panel p-4">
            <h2 class="h3 mb-3" data-i18n="aboutMonument">About this monument</h2>
            <p id="monumentDescription" class="mb-0">...</p>
          </article>
        </div>
        <div class="col-lg-5" data-aos="fade-up" data-aos-delay="120">
          <aside class="premium-panel p-4">
            <h2 class="h4 mb-3" data-i18n="quickFacts">Quick Facts</h2>
            <ul class="fact-list list-unstyled mb-0">
              <li><span data-i18n="factLocation">Location:</span> <strong id="monumentLocation">-</strong></li>
              <li><span data-i18n="factPeriod">Period:</span> <strong id="monumentPeriod">-</strong></li>
              <li><span data-i18n="factStyle">Style:</span> <strong id="monumentStyle">-</strong></li>
              <li><span data-i18n="factYear">Year:</span> <strong id="monumentYear">-</strong></li>
              <li><span data-i18n="factMetric">Numbers:</span> <strong id="monumentMetric">-</strong></li>
            </ul>
          </aside>
        </div>

        <div class="col-12" data-aos="fade-up">
          <section class="premium-panel p-4">
            <h2 class="h3 mb-4" data-i18n="galleryTitle">Photo Gallery</h2>
            <div class="row g-3" id="galleryGrid"></div>
          </section>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container py-4 text-center">
      <p class="mb-1 footer-muted" data-i18n="footerText">Your smart historical guide for travelers.</p>
      <small class="footer-muted">© <span id="yearNow"></span> Madrasalar</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
